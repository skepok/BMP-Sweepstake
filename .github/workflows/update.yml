name: Rebuild standings

# Data is scraped + committed from your local machine (scripts/scrape.py via cron).
# This workflow is just a manual convenience: rebuild data/standings.json from the
# already-committed cache/raw_matches.json — e.g. after editing data/players.json.
# It does NOT scrape (SofaScore blocks GitHub's datacenter IPs) and needs no secret.
on:
  workflow_dispatch: {}

concurrency:
  group: rebuild-standings
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Rebuild standings from committed data
        run: node scripts/build.mjs

      - name: Commit if changed
        run: |
          git config user.name  "blair-mitch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/standings.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild standings"
            git push
          fi
