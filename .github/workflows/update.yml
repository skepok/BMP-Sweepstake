name: Update standings

# Runs the fixture-aware builder. Most runs make ZERO API calls; only runs
# shortly after a match finishes spend a request or two. Well under 100/day.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes (UTC)
  workflow_dispatch: {}       # manual "Run workflow" button

# Let one run finish before the next starts; don't cancel a run mid-fetch.
concurrency:
  group: update-standings
  cancel-in-progress: false

permissions:
  contents: write             # needed to commit the refreshed data back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build standings
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          LEAGUE_ID: '1'
          SEASON: '2026'
        run: node scripts/build.mjs

      - name: Commit updated data
        run: |
          git config user.name  "blair-mitch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/standings.json cache/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update standings"
            git push
          fi
